<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabFlow 分享集合</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC',
                   'Microsoft JhengHei', sans-serif;
      background: #F1F5F9; color: #1E293B;
      min-height: 100vh; padding: 24px 16px 60px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .logo { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; }
    .col-name { font-size: 24px; font-weight: 800; line-height: 1.3; margin-bottom: 5px; }
    .col-meta { font-size: 13px; color: #64748B; margin-bottom: 16px; }
    .btn-open-all {
      display: inline-flex; align-items: center; gap: 8px;
      background: #3B82F6; color: white; border: none; border-radius: 12px;
      padding: 12px 24px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-bottom: 20px; transition: background .15s;
    }
    .btn-open-all:hover { background: #2563EB; }
    .note { font-size: 12px; color: #94A3B8; margin-bottom: 20px; }
    .tab-list { display: flex; flex-direction: column; gap: 7px; }
    .tab-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; background: #fff;
      border: 1.5px solid #E2E8F0; border-radius: 12px;
      text-decoration: none; color: #1E293B;
      transition: border-color .15s, box-shadow .15s;
    }
    .tab-item:hover { border-color: #3B82F6; box-shadow: 0 2px 8px rgba(59,130,246,.12); }
    .fav { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; object-fit: contain; }
    .fav-ph { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; background: #E2E8F0; }
    .tab-title { flex: 1; font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tab-host { font-size: 12px; color: #94A3B8; flex-shrink: 0; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .error { text-align: center; padding: 80px 20px; color: #64748B; }
    .error-icon { font-size: 48px; margin-bottom: 14px; }
    .error-msg { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #94A3B8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 20 20" fill="none">
          <rect width="20" height="20" rx="5" fill="#3B82F6"/>
          <path d="M5 7h10M5 10h7M5 13h5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        TabFlow
      </div>
    </div>
    <div id="app"></div>
    <div class="footer">由 TabFlow 擴充功能分享</div>
  </div>

  <script>
    function fmtDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function host(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
    }
    function favUrl(url) {
      try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch { return ''; }
    }
    function favImg(favicon, url) {
      const src = favicon || favUrl(url);
      if (!src) return '<div class="fav-ph"></div>';
      return `<img class="fav" src="${esc(src)}" loading="lazy" onerror="this.outerHTML='<div class=\\'fav-ph\\'></div>'">`;
    }

    async function decodeHash(hash) {
      // Try compressed (new format, URL-safe base64) first, then fall back to old base64 format
      try {
        const b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const ds = new DecompressionStream('deflate-raw');
        const writer = ds.writable.getWriter();
        writer.write(bytes);
        writer.close();
        const json = await new Response(ds.readable).text();
        return JSON.parse(json);
      } catch {
        return JSON.parse(decodeURIComponent(escape(atob(hash))));
      }
    }

    (async () => {
      try {
        const params = new URLSearchParams(location.search);
        const shareId = params.get('id');
        const hash = location.hash.slice(1);

        let data;
        if (shareId) {
          const resp = await fetch(`/api/get?id=${encodeURIComponent(shareId)}`);
          if (resp.status === 404) throw new Error('expired');
          if (!resp.ok) throw new Error('fetch');
          data = await resp.json();
        } else if (hash) {
          data = await decodeHash(hash);
        } else {
          throw new Error('empty');
        }

        if (data.expiresAt && Date.now() > data.expiresAt) throw new Error('expired');

        const tabs = data.tabs || [];
        document.title = `${data.name || '集合'} — TabFlow`;

        const noteHtml = data.note
          ? `<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:14px;color:#78350F;line-height:1.6">💬 ${esc(data.note)}</div>`
          : '';

        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="col-name">${esc(data.name || '集合')}</div>
          <div class="col-meta">${tabs.length} 個連結${data.expiresAt ? ` ‧ 有效至 ${fmtDate(data.expiresAt)}` : ''}</div>
          ${noteHtml}
          <button class="btn-open-all" id="btnOpenAll">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M7 3H4a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-3M10 3h5m0 0v5m0-5L8 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            一口氣展開所有分頁（${tabs.length} 個）
          </button>
          <p class="note">⚠ 瀏覽器可能封鎖彈出視窗，如未全部開啟請允許此頁面的彈出視窗後再試。桌機版可透過 TabFlow 擴充功能「以群組開啟」，手機版不支援群組功能。</p>
          <div class="tab-list">
            ${tabs.map(t => `
              <a class="tab-item" href="${esc(t.url)}" target="_blank" rel="noopener noreferrer">
                ${favImg(t.favicon, t.url)}
                <span class="tab-title">${esc(t.title || t.url)}</span>
                <span class="tab-host">${esc(host(t.url))}</span>
              </a>
            `).join('')}
          </div>`;

        document.getElementById('btnOpenAll').addEventListener('click', () => {
          tabs.forEach((t, i) => {
            setTimeout(() => window.open(t.url, '_blank', 'noopener'), i * 30);
          });
        });
      } catch (err) {
        const expired = err.message === 'expired';
        document.getElementById('app').innerHTML = `
          <div class="error">
            <div class="error-icon">${expired ? '⏰' : '🔗'}</div>
            <div class="error-msg">${expired ? '連結已過期' : '無效的分享連結'}</div>
            <div class="error-sub">${expired ? '此分享連結的有效期（30 天）已結束' : '連結可能格式不正確'}</div>
          </div>`;
      }
    })();
  </script>
</body>
</html>
